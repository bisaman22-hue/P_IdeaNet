{% extends "base.html" %}
{% block content %}
<h3>➕ Add New Project</h3>
<form method="POST" enctype="multipart/form-data">
  <div class="mb-3">
    <label>Project Title</label>
    <input type="text" name="title" class="form-control" required>
  </div>
  <div class="mb-3">
    <label>Author</label>
    <input type="text" name="author" class="form-control" required>
  </div>
  <div class="mb-3">
    <label>Description</label>
    <textarea name="description" class="form-control" rows="3" required></textarea>
  </div>
  <div class="mb-3">
    <label>Category</label>
    <input type="text" name="category" class="form-control" placeholder="e.g. AI, ML, IoT">
  </div>
  <div class="mb-3">
    <label>Upload PDF</label>
    <input type="file" name="pdf" class="form-control">
  </div>
  <div class="form-check mb-3">
    <input class="form-check-input" type="checkbox" name="is_public" checked>
    <label class="form-check-label">Make project public</label>
  </div>
  <button type="submit" class="btn btn-success">Upload Project</button>
  <a href="{{ url_for('projects') }}" class="btn btn-secondary">Cancel</a>
</form>
{% endblock %}
