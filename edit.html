{% extends "base.html" %}
{% block content %}
<h3>✏️ Edit Project</h3>
<form method="POST" enctype="multipart/form-data">
  <div class="mb-3">
    <label>Project Title</label>
    <input type="text" name="title" class="form-control" value="{{ project['title'] }}" required>
  </div>
  <div class="mb-3">
    <label>Author</label>
    <input type="text" name="author" class="form-control" value="{{ project['author'] }}" required>
  </div>
  <div class="mb-3">
    <label>Description</label>
    <textarea name="description" class="form-control" rows="3" required>{{ project['description'] }}</textarea>
  </div>
  <div class="mb-3">
    <label>Category</label>
    <input type="text" name="category" class="form-control" value="{{ project['category'] }}">
  </div>
  <div class="mb-3">
    <label>Change PDF (optional)</label>
    <input type="file" name="pdf" class="form-control">
  </div>
  <div class="form-check mb-3">
    <input class="form-check-input" type="checkbox" name="is_public" {% if project['is_public'] %}checked{% endif %}>
    <label class="form-check-label">Public Project</label>
  </div>
  <button type="submit" class="btn btn-primary">Save Changes</button>
  <a href="{{ url_for('projects') }}" class="btn btn-secondary">Cancel</a>
</form>
{% endblock %}
